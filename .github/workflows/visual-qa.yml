name: Visual QA

on:
  pull_request:
  workflow_dispatch:

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install browser runtime
        run: npx --no-install playwright install --with-deps chromium

      - name: Visual capture
        run: npm run qa:visual:capture

      - name: Visual smoke
        run: npm run qa:visual:smoke

      - name: Commercial visual QA
        run: npm run qa:visual:commercial

      - name: Visual status
        run: npm run qa:visual:status

      - name: Upload visual QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-artifacts
          path: |
            artifacts/homepage.png
            artifacts/visual-commercial/*.png
            artifacts/visual-status/*.json
          if-no-files-found: warn

      - name: Percy snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: npm run qa:visual:percy
