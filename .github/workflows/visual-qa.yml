name: Visual QA

on:
  pull_request:
  workflow_dispatch:

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install browser runtime
        run: npx --no-install playwright install --with-deps chromium

      - name: Visual capture
        run: npm run qa:visual:capture

      - name: Visual smoke
        run: npm run qa:visual:smoke

      - name: Commercial visual QA
        run: npm run qa:visual:commercial

      - name: Visual status
        run: npm run qa:visual:status

      - name: Upload visual QA artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-qa-artifacts
          path: |
            artifacts/homepage.png
            artifacts/visual-commercial/*.png
            artifacts/visual-status/*.json
          if-no-files-found: warn

      - name: Percy snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: npm run qa:visual:percy
