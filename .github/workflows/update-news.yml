
name: Update News & Dashboard

on:
  schedule:
    # News: every 6 hours
    - cron: '0 */6 * * *'
    # Dashboard sync: every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need write access to commit changes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run news update
        run: node scripts/update-news.js

      - name: Run dashboard data sync
        run: node scripts/sync-dashboard-data.cjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- src/data/latest-news.json public/dashboard-data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected."
          fi

      - name: Commit and Push changes
        if: steps.changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update news + dashboard data [skip ci]"
          file_pattern: |
            src/data/latest-news.json
            public/dashboard-data.json
          push_options: '--force' # Optional, but good for ensuring updates land
