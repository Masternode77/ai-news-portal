name: Update News & Dashboard

on:
  schedule:
    # Full news pipeline: 00:05 / 08:05 / 16:05 KST
    - cron: '5 15 * * *'
    - cron: '5 23 * * *'
    - cron: '5 7 * * *'
    # Dashboard sync: every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-news:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule != '*/15 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    concurrency:
      group: ai-news-portal-update-news
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run check

      - name: Run news update
        timeout-minutes: 18
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          EXPERT_LENS_MODEL: ${{ secrets.EXPERT_LENS_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ARCHIVE_TABLE: ${{ secrets.SUPABASE_ARCHIVE_TABLE }}
        run: npm run pipeline

      - name: Run dashboard data sync
        run: npm run sync:dashboard-data

      - name: Validate production build
        run: npm run build

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/data/latest-news.json \
            src/data/archived-news.json \
            src/data/search-index.json \
            src/data/news-pool.json \
            scripts/state/pipeline-state.json \
            public/dashboard-data.json \
            public/generated || true

          if git diff --cached --quiet; then
            echo "No tracked changes to commit."
            exit 0
          fi

          git commit -m "chore: refresh news surface, archive, and dashboard [skip ci]"
          git push origin HEAD:main || {
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          }

  dashboard-sync:
    if: github.event_name != 'workflow_dispatch' && github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: ai-news-portal-dashboard-sync
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dashboard data sync
        run: npm run sync:dashboard-data

      - name: Commit and push dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/dashboard-data.json

          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi

          git commit -m "chore: refresh dashboard snapshot [skip ci]"
          git push origin HEAD:main || {
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          }
