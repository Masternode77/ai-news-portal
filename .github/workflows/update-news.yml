name: Curate AI/DC News

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run curation pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
        run: npm run pipeline

      - name: Verify build
        run: npm run build

      - name: Commit and push updated content
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 8h AI/DC curation update [skip ci]"
          branch: main
          file_pattern: src/data/*.json scripts/state/*.json public/generated/*
