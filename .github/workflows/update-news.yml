
name: Update News & Dashboard

on:
  schedule:
    # 00:05 / 08:05 / 16:05 KST
    - cron: '5 15 * * *'
    - cron: '5 23 * * *'
    - cron: '5 7 * * *'
    # Dashboard sync: every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need write access to commit changes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run news update
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          EXPERT_LENS_MODEL: ${{ secrets.EXPERT_LENS_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ARCHIVE_TABLE: ${{ secrets.SUPABASE_ARCHIVE_TABLE }}
        run: npm run pipeline

      - name: Run dashboard data sync
        run: node scripts/sync-dashboard-data.cjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- src/data/latest-news.json src/data/archived-news.json src/data/search-index.json public/dashboard-data.json public/generated; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected."
          fi

      - name: Commit and Push changes
        if: steps.changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh news surface, archive, and dashboard [skip ci]"
          file_pattern: |
            src/data/latest-news.json
            src/data/archived-news.json
            src/data/search-index.json
            public/dashboard-data.json
            public/generated/**
