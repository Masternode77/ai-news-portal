name: Update News

on:
  schedule:
    # Full news pipeline: 00:05 / 08:05 / 16:05 KST
    - cron: '5 15 * * *'
    - cron: '5 23 * * *'
    - cron: '5 7 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    concurrency:
      group: ai-news-portal-main-writes
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore canonical content checkpoint
        uses: actions/cache/restore@v4
        with:
          path: .cache/content-cycle
          key: content-cycle-v2-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            content-cycle-v2-${{ runner.os }}-${{ github.ref_name }}-

      - name: Validate project
        run: npm run check

      - name: Run news update
        timeout-minutes: 18
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          EXPERT_LENS_MODEL: ${{ secrets.EXPERT_LENS_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ARCHIVE_TABLE: ${{ secrets.SUPABASE_ARCHIVE_TABLE }}
        run: npm run content:cycle

      - name: Preserve canonical content checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/content-cycle
          key: content-cycle-v2-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Validate production build
        run: npm run build

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/data/latest-news.json \
            src/data/archived-news.json \
            src/data/search-index.json \
            src/data/news-pool.json \
            scripts/state/pipeline-state.json \
            public/generated || true

          if git diff --cached --quiet; then
            echo "No tracked changes to commit."
            exit 0
          fi

          changed_files="$(git diff --cached --name-only)"
          if echo "$changed_files" | grep -Eq '^(src/data/(latest-news|archived-news|search-index|news-pool)\.json|public/generated/)'; then
            git commit -m "chore: refresh news surface and archive"
          else
            git commit -m "chore: refresh dashboard state [skip ci]"
          fi
          git push origin HEAD:main || {
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          }
