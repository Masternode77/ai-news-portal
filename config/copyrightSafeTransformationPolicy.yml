max_paragraph_overlap: 0.22
max_source_sentence_reuse: 0.15
minimum_value_add_sections:
  - interpretation
  - context
  - implication
  - counterargument
  - watch metrics
  - stakeholder impact
rules:
  - Do not copy source article paragraphs.
  - Do not quote more than short excerpts where necessary.
  - Prefer paraphrase, synthesis, and original analysis.
  - Block publication if source overlap exceeds threshold.
